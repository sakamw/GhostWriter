<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7" />
      <stop offset="50%" stop-color="#a29bfe" />
      <stop offset="100%" stop-color="#74b9ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.5" />
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  /* The "Flow" Pen Nib / F shape */
  <path d="M30 20C30 20 25 45 25 55C25 65 35 75 50 75C65 75 75 65 75 55C75 45 70 20 70 20L50 35L30 20Z" fill="url(#logoGrand)" />
  <path d="M50 35V75" stroke="white" stroke-width="2" stroke-linecap="round" />
  
  /* Additional "Spark" for premium feel */
  <circle cx="75" cy="25" r="5" fill="white" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </circle>
  
  /* Abstract Flow Line */
  <path d="M15 85C30 75 70 95 85 85" stroke="url(#logoGrand)" stroke-width="4" stroke-linecap="round" />
</svg>
